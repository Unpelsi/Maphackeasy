<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxrana Loutaba — Web Radar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',Tahoma,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.header{width:100%;background:linear-gradient(135deg,#0d1117,#161b22);padding:14px 20px;border-bottom:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:16px;color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,0.3)}
.header .status{font-size:12px;color:#555}
.header .status.live{color:#22c55e}
.header .status.dead{color:#ef4444}
.canvas-wrap{margin-top:20px;position:relative}
canvas{border:2px solid #1f2937;border-radius:12px;background:#08080c;box-shadow:0 0 30px rgba(0,229,255,0.08)}
.controls{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
.controls label{font-size:13px;color:#888}
.controls input[type=range]{width:120px;accent-color:#00e5ff}
.controls select{background:#111318;color:#e0e0e0;border:1px solid #2a2f3a;padding:4px 8px;border-radius:4px;font-size:12px}
.info{margin-top:12px;font-size:11px;color:#444;text-align:center;max-width:600px;line-height:1.6}
.legend{display:flex;gap:16px;margin-top:10px;font-size:12px}
.legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.legend .t{background:#ffd93d}.legend .ct{background:#ff5050}.legend .you{background:#fff}.legend .bomb{background:#ffdc00;border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <h1>OXRANA LOUTABA — Web Radar</h1>
  <div class="status" id="status">Connecting...</div>
</div>
<div class="canvas-wrap">
  <canvas id="radar" width="520" height="520"></canvas>
</div>
<div class="controls">
  <label>Scale: <input type="range" id="scale" min="1" max="12" step="0.5" value="4"></label>
  <label>Size: <input type="range" id="size" min="300" max="800" step="20" value="520"></label>
  <label>Rotate: <select id="rotate"><option value="1">Follow View</option><option value="0">North Up</option></select></label>
  <label><input type="checkbox" id="names" checked> Names</label>
  <label><input type="checkbox" id="hp" checked> HP</label>
</div>
<div class="legend">
  <span><span class="dot you"></span>You</span>
  <span><span class="dot t"></span>T</span>
  <span><span class="dot ct"></span>CT</span>
  <span><span class="dot bomb"></span>Bomb</span>
</div>
<div class="info" id="debug"></div>

<script>
const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');
const scaleEl = document.getElementById('scale');
const sizeEl = document.getElementById('size');
const rotateEl = document.getElementById('rotate');
const namesEl = document.getElementById('names');
const hpEl = document.getElementById('hp');

let lastData = null;
let lastFetchOk = false;
let mapImg = null;
let currentMapName = '';

function loadMapImage(mapName){
  if(mapName === currentMapName && mapImg) return;
  currentMapName = mapName;
  mapImg = new Image();
  mapImg.onload = () => { console.log('Map loaded:', mapName, mapImg.naturalWidth + 'x' + mapImg.naturalHeight); };
  mapImg.onerror = () => { mapImg = null; console.warn('Map image not found:', mapName); };
  mapImg.src = '/maps/' + mapName + '_radar_psd.png';
}

function resizeCanvas(){
  const s = parseInt(sizeEl.value);
  canvas.width = s;
  canvas.height = s;
}
resizeCanvas();
sizeEl.addEventListener('change', resizeCanvas);

async function fetchData(){
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch('/api/radar', { signal: ctrl.signal });
    clearTimeout(timer);
    if(!r.ok) throw 0;
    const data = await r.json();
    if(data && data.localPlayer){
      lastData = data;
      if(!lastFetchOk){ lastFetchOk = true; statusEl.textContent = 'Live'; statusEl.className = 'status live'; }
      debugEl.textContent = 'Players: ' + (data.players ? data.players.length : 0);
      return;
    }
    debugEl.textContent = data.error || 'Waiting for game...';
  }catch(e){
    if(lastFetchOk){ lastFetchOk = false; statusEl.textContent = 'Disconnected'; statusEl.className = 'status dead'; }
    debugEl.textContent = 'Connecting to relay...';
  }
}

function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx = canvas.width/2, cy = canvas.height/2;
  const radius = canvas.width/2 - 4;

  // Background circle
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.stroke();

  if(!lastData || !lastData.localPlayer){
    ctx.fillStyle = '#555'; ctx.font = '14px Tahoma'; ctx.textAlign = 'center';
    const msg = (lastData && lastData.error) ? lastData.error : 'Waiting for data...';
    ctx.fillText(msg, cx, cy);
    return;
  }

  const lp = lastData.localPlayer;
  const scale = parseFloat(scaleEl.value);
  const doRotate = rotateEl.value === '1';
  let cosY = 1, sinY = 0;
  if(doRotate && lp.yaw !== undefined){
    const yawRad = -lp.yaw * Math.PI / 180;
    cosY = Math.cos(yawRad); sinY = Math.sin(yawRad);
  }

  // World-to-screen projection (with rotation if enabled)
  function project(wx, wy){
    let dx = wx - lp.x, dy = wy - lp.y;
    let rx = doRotate ? dx * cosY - dy * sinY : dx;
    let ry = doRotate ? dx * sinY + dy * cosY : dy;
    let px = cx + rx / scale, py = cy - ry / scale;
    let ddx = px - cx, ddy = py - cy;
    let dist = Math.sqrt(ddx*ddx + ddy*ddy);
    let maxR = radius - 8;
    if(dist > maxR){ px = cx + ddx*maxR/dist; py = cy + ddy*maxR/dist; }
    return {x:px, y:py};
  }

  // Load map image
  if(lastData.map){
    const m = lastData.map.match(/\/([^\/]+?)(?:\.vpk)?$/);
    const shortName = m ? m[1] : '';
    if(shortName) loadMapImage(shortName);
  }

  // Draw map image
  const mm = lastData.minimap;
  const hasBounds = mm && (mm.maxX > mm.minX);

  if(mapImg && mapImg.complete && mapImg.naturalWidth > 0 && hasBounds){
    // Project 3 corners: image (0,0)=top-left=(minX,maxY), (W,0)=top-right=(maxX,maxY), (0,H)=bottom-left=(minX,minY)
    const tl = project(mm.minX, mm.maxY);
    const tr = project(mm.maxX, mm.maxY);
    const bl = project(mm.minX, mm.minY);

    const imgW = mapImg.naturalWidth;
    const imgH = mapImg.naturalHeight;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.clip();

    // Affine transform mapping image space to projected space
    ctx.transform(
      (tr.x - tl.x) / imgW, (tr.y - tl.y) / imgW,
      (bl.x - tl.x) / imgH, (bl.y - tl.y) / imgH,
      tl.x, tl.y
    );
    ctx.globalAlpha = 0.85;
    ctx.drawImage(mapImg, 0, 0);
    ctx.restore();
  } else if(hasBounds){
    // Fallback: rectangle
    const tl = project(mm.minX, mm.maxY);
    const tr = project(mm.maxX, mm.maxY);
    const bl = project(mm.minX, mm.minY);
    const br = project(mm.maxX, mm.minY);
    ctx.strokeStyle = 'rgba(100,120,140,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(20,30,45,0.5)';
    ctx.fill();
    ctx.stroke();
  }

  // Map name label
  if(currentMapName){
    ctx.fillStyle = 'rgba(150,170,190,0.6)';
    ctx.font = '11px Tahoma'; ctx.textAlign = 'left';
    ctx.fillText(currentMapName, 8, canvas.height - 8);
  }

  // Bomb
  if(lastData.bomb && lastData.bomb.found){
    const bp = project(lastData.bomb.x, lastData.bomb.y);
    ctx.fillStyle = '#ffdc00'; ctx.fillRect(bp.x-5, bp.y-5, 10, 10);
    ctx.strokeStyle = '#000'; ctx.strokeRect(bp.x-5, bp.y-5, 10, 10);
    if(namesEl.checked){
      ctx.fillStyle='#ffdc00'; ctx.font='10px Tahoma'; ctx.textAlign='center';
      ctx.fillText('BOMB', bp.x, bp.y - 9);
    }
  }

  // Players
  if(lastData.players){
    for(const p of lastData.players){
      const pp = project(p.x, p.y);
      const color = p.team === 2 ? '#ffd93d' : '#ff5050';
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(pp.x, pp.y, 5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(pp.x, pp.y, 5, 0, Math.PI*2); ctx.stroke();
      if(namesEl.checked && p.name){
        ctx.fillStyle = color; ctx.font = '10px Tahoma'; ctx.textAlign='center';
        ctx.fillText(p.name, pp.x, pp.y - 9);
      }
      if(hpEl.checked && p.hp !== undefined){
        const barW = 24, barH = 3;
        const bx = pp.x - barW/2, by = pp.y + 8;
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(bx, by, barW, barH);
        const hpPct = Math.max(0, Math.min(100, p.hp)) / 100;
        ctx.fillStyle = hpPct > 0.5 ? '#22c55e' : (hpPct > 0.2 ? '#eab308' : '#ef4444');
        ctx.fillRect(bx, by, barW * hpPct, barH);
      }
    }
  }

  // Local player (center dot)
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.stroke();

  // View direction
  if(doRotate){
    ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 16); ctx.stroke();
    ctx.fillStyle = 'rgba(0,229,255,0.08)';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, -Math.PI/2 - Math.PI/4, -Math.PI/2 + Math.PI/4);
    ctx.closePath(); ctx.fill();
  }
}

setInterval(fetchData, 200);
fetchData();
requestAnimationFrame(draw);
</script>
</body>
</html>
